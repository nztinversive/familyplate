services:
  - type: web
    name: familyplate
    runtime: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm run start --workspace=@familyplate/web -- --hostname 0.0.0.0 --port $PORT
    envVars:
      - key: NODE_ENV
        value: production
      - key: NEXT_PUBLIC_CONVEX_URL
        sync: false
      - key: APP_URL
        sync: false
      - key: NEXT_PUBLIC_POSTHOG_KEY
        sync: false
      - key: NEXT_PUBLIC_POSTHOG_HOST
        sync: false
      - key: NEXT_PUBLIC_SENTRY_DSN
        sync: false
      - key: SENTRY_DSN
        sync: false
      - key: SENTRY_ORG
        sync: false
      - key: SENTRY_PROJECT
        sync: false
      - key: SENTRY_AUTH_TOKEN
        sync: false
